<style>
    @font-face {
        font-family: mainFont;
        src: url(GoogleSansFlex_9pt-ExtraBold.ttf);
    }
    *{
        font-family: mainFont;
    }
    #menu{
        position: absolute;
        top:0;
        right: 0;
        margin-top: 20px;
        margin-right: 30px;
        font-weight: 900;
        font-size: 21px;
        position: fixed;
    }
    body{
        margin: auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        margin-top: 65px;
        align-items: center;
        overflow-x: hidden;
    }
    a{
        color:purple;
        text-decoration: underline;
    }
    #logo img{
        width: 100px;
        border-radius: 50%;
    }
    #name{
        text-transform: uppercase;
        font-weight: 100;
        letter-spacing: 1px;
        margin-top: 5%;
        font-family: mainFont;
    }
    #discount{
        font-weight: 900;
        font-size: 25px;
        margin-top: 2.5%;
    }
    #code{
        border: solid black 1px;
        border-radius: 50px;
        display: flex;
        justify-content: space-between;
        width: 50%;
        padding:5px 20px;
        font-weight: 900;
        font-size: 25px;
        margin-top: 5%;
        align-items: center;
    }
    #code .text{
        font-size: 22px;
    }
    #code .copy{
        background-color: #741fa2;
        padding:10px 20px;
        border-radius: 50px;
        color:white;
        font-weight: 700;
        margin-right: -12px;
        font-size: 17px;
        letter-spacing: 1px;
        cursor: pointer;
    }
    #description{
        font-size: 12px;
        margin-top: 2%;
    }
    #ends{
        margin-top: 3%;
        font-weight: 600;
        font-size: 17px;
    }
    #line{
        border:solid rgba(0, 0, 0, 0.08) 1px;
        margin:35px auto auto auto;
        width: 100%;
    }
    #images{
        display: grid;
        grid-template-columns: repeat(1,1fr);
    }
    #images #one{
        grid-column: 1;
        grid-row: 1;
        width: 300px;
    }
    #images #two{
        grid-column: 1;
        grid-row: 1;
        width: 300px;
        margin-top: 175px;
        margin-left: 20px;
    }
    #download{
        font-weight: bolder;
        font-size: 22px;
    }
    button{
        background-color: black;
        padding:10px 50px;
        border: none;
        color:white;
        font-weight: bolder;
        font-size: 17px;
        border-radius: 50px;
        margin-top: 3%;
    }
    button a{
        text-decoration: none;
        color: white;
    }
    #rating{
        font-weight: bolder;
        font-size: 17px;
        align-items: center;
        display: flex;
        margin-top: 3%;
    }
    #rating img{
        width:15px;
        margin: auto 5px;
    }
    footer{
        background-color: rgba(128, 128, 128, 0.089);
        font-size: 12px;
        padding:25px;
        text-align: center;
        font-weight: 500;
        margin-top: 15px;
    }
</style>
